<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PROJETO | COMMAND CENTER</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="project-container" style="padding: 40px;">
        <h1 id="p-title">Carregando...</h1>
        <p id="p-desc"></p>
        <div id="p-content"></div>
        <br>
        <a href="../" class="btn" style="width: auto;">VOLTAR AO HUB</a>
    </div>

    <script>
        // Função para ler o parâmetro da URL
        async function loadProject() {
            const params = new URLSearchParams(window.location.search);
            const pName = params.get('project'); // Pega "porto-vix"
            
            if (!pName) return;

            // Busca os dados do seu arquivo data.json na raiz
            const response = await fetch('../data.json');
            const data = await response.json();
            
            // Procura o projeto correspondente no JSON
            const project = data.projects.items.find(i => i.slug === pName);

            if (project) {
                document.getElementById('p-title').textContent = project.name;
                document.getElementById('p-desc').textContent = project.context;
                // Carrega o conteúdo (ou iframe)
                document.getElementById('p-content').innerHTML = `<iframe src="${project.url}"></iframe>`;
            }
        }
        loadProject();
    </script>
</body>
</html>
