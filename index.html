<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flávia Porcu Pissarra</title>
    <link rel="stylesheet" href="./core/style.css">
    <script src="./core/script.js" defer></script>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="profile-section">
                <img id="profile-img" class="avatar-holder" src="" alt="Profile Image" style="display:none;">
                <h1 id="profile-name" class="profile-name">Flávia P. Pissarra</h1>
                <p id="profile-headline" class="profile-headline"></p>
            </div>

            <nav id="dynamic-menu" class="menu-container"></nav>

            <div class="social-links-container">
                <a id="link-github" class="social-link" href="https://github.com/fppissarra" target="_blank" rel="noopener">GitHub</a>
                <a id="link-linkedin" class="social-link" href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
                <a id="link-email" class="social-link" href="mailto:your-email@example.com">Mail me</a>
            </div>

            <div class="lang-selector-container">
                <select id="lang-selector" class="lang-dropdown">
                    <option value="en" selected>English (ENG)</option>
                    <option value="pt">Português (PTB)</option>
                    <option value="es">Español (ESP)</option>
                    <option value="it">Italiano (ITA)</option>
                    <option value="ja">日本語 (JAP)</option>
                    <option value="ko">한국어 (KOR)</option>
                </select>
            </div>
        </aside>

        <main class="main-content">
            <div class="construction-overlay">
                <span class="construction-text" id="content-placeholder">WEBSITE UNDER CONSTRUCTION</span>
            </div>
            
            <div id="projects-display" class="projects-display-area" style="display:none;"></div>
        </main>
    </div>

</body>
</html>
