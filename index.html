<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flávia P. Pissarra | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Seletor de Idiomas -->
    <nav class="lang-selector">
        <button onclick="translateContent('en')">English</button>
        <button onclick="translateContent('pt')">Português</button>
        <button onclick="translateContent('es')">Español</button>
        <button onclick="translateContent('ja')">日本語</button>
        <button onclick="translateContent('ko')">한국어</button>
    </nav>

    <header>
        <!-- O ID txt-role será preenchido pelo script -->
        <h1 id="txt-role" data-translate>
            Data Scientist | Foreign Trade & Port Logistics | Multilingual (PT/EN/ES/IT/JP/KO) | Former Intern at Vale & ArcelorMittal
        </h1>
    </header>

    <main id="experience-container">
        <!-- O JavaScript irá gerar as seções de Indústria, Pesquisa e Docência aqui dentro -->
    </main>

    <script src="script.js"></script>
</body>
</html>
