<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flávia P. Pissarra | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pearl: #fdfcf9;
            --pearl-gradient: linear-gradient(135deg, #fdfcf9 0%, #f5f2ed 100%);
            --glass-white: rgba(255, 255, 255, 0.4);
            --border-pearl: rgba(255, 255, 255, 0.8);
            --text-main: #4a4540;
            --text-sub: #8c857e;
        }

        body {
            background: var(--pearl-gradient) !important; /* Força o fundo perolado */
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            background: rgba(253, 252, 249, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-pearl);
            padding: 40px 0;
            text-align: center;
        }

        .user-name {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            color: var(--text-main);
            font-weight: 600;
        }

        #txt-role {
            font-weight: 400;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--text-sub);
            margin: 0;
            max-width: 850px;
            display: inline-block;
        }

        .content-scroll {
            margin-top: 240px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
        }

        .glass-box {
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-pearl);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 720px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        }

        .section-label {
            color: var(--text-sub);
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.5px;
        }

        .exp-header {
            display: flex;
            justify-content: space-between;
            margin: 15px 0 5px 0;
        }

        .exp-title { font-size: 1.4rem; font-weight: 600; }
        .exp-period { color: #b0aaa3; font-size: 0.85rem; }

        .company-tag {
            color: #8c857e;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: block;
        }

        .details-text {
            line-height: 1.8;
            color: #5e5852;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>

    <header class="fixed-header">
        <div class="header-content">
            <h1 class="user-name">Flávia P. Pissarra</h1>
            <p id="txt-role">
                Data Scientist | Foreign Trade & Port Logistics | Multilingual | Specialized in Industrial Data & Technical Translation
            </p>
        </div>
    </header>

    <main id="experience-container" class="content-scroll"></main>

    <script>
        const experiences = [
            {
                category: "Industry, Logistics & Data Intelligence",
                title: "Data Analyst & Technical Interpreter",
                period: "2018 — 2019",
                company: "Vale | ArcelorMittal (CPGC)",
                details: "Optimized industrial logistics at ArcelorMittal's CPGC through automated SQL/Python pipelines. Acted as a technical interpreter, ensuring precise communication of engineering and safety protocols between international teams."
            },
            {
                category: "Research & Language Technology (NLP)",
                title: "Computational Linguistics & MTPE Lead",
                period: "2020 — 2023",
                company: "Ifes / Lab CTecL (FAPES)",
                details: "Directed research in Machine Translation Post-Editing (MTPE) to ensure technical and contractual accuracy. Developed Python scripts for processing large-scale technical and port documentation for global markets."
            },
            {
                category: "Global Communication & Maritime Support",
                title: "Specialized Training & Intercultural Mediation",
                period: "2019 — 2026",
                company: "Maritime Sector | JUCEES",
                details: "Provided specialized Business English training for offshore professionals and ship crews. Managing technical translation and intercultural mediation, while preparing for Sworn Translator certification (JUCEES)."
            }
        ];

        function render() {
            const container = document.getElementById('experience-container');
            container.innerHTML = experiences.map(exp => `
                <article class="glass-box">
                    <span class="section-label">${exp.category}</span>
                    <div class="exp-header">
                        <span class="exp-title">${exp.title}</span>
                        <span class="exp-period">${exp.period}</span>
                    </div>
                    <span class="company-tag">${exp.company}</span>
                    <p class="details-text">${exp.details}</p>
                </article>
            `).join('');
        }
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
