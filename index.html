<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flávia P. Pissarra | CV Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fundo perolado suave -->
    <div class="pearl-background"></div>

    <main class="container">
        <!-- Cabeçalho Estático: Identidade e Contatos -->
        <header class="glass-box main-header static-box">
            <div class="lang-selector">
                <button onclick="setLanguage('en')" id="btn-en">EN</button>
                <button onclick="setLanguage('pt')" id="btn-pt" class="active">PT</button>
                <button onclick="setLanguage('es')" id="btn-es">ES</button>
            </div>

            <h1>Flávia P. Pissarra</h1>
            <p id="txt-role" class="description">
                Cientista de Dados em transição para Comércio Exterior e Logística Portuária | Multilíngue | Ex-estagiária Vale & ArcelorMittal
            </p>

            <div class="contact-links">
                <a href="https://linkedin.com/in/fppissarra" target="_blank">LinkedIn</a>
                <a href="https://github.com/fppissarra" target="_blank">GitHub</a>
                <a href="mailto:flaviapissarra@gmail.com">Email</a>
            </div>
        </header>

        <!-- Container onde o script.js injetará as categorias (Docência, Pesquisa, Indústria) -->
        <section id="experience-container"></section>
    </main>

    <script src="script.js"></script>
</body>
</html>
