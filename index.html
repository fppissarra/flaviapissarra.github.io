<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flávia P. Pissarra - Portfolio</title>
    <link rel="stylesheet" href="core/style.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="profile-section">
                <img src="" alt="Flávia P. Pissarra" class="profile-avatar">
                <h1 class="profile-name">Flávia P. Pissarra</h1>
                <p class="profile-headline"></p>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-btn active" data-panel="bi"></button>
                <button class="nav-btn" data-panel="translation"></button>
                <button class="nav-btn" data-panel="about"></button>
            </nav>

            <div class="social-footer">
                <a href="https://www.github.com/fppissarra" target="_blank" class="social-link" id="link-gh"></a>
                <a href="https://www.linkedin.com/in/fppissarra" target="_blank" class="social-link" id="link-ln"></a>
                <a href="mailto:fppissarra@gmail.com" class="social-link" id="link-em"></a>
            </div>

            <div class="language-dropdown-wrapper">
                <select id="custom-lang-select" class="lang-select">
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="it">Italiano</option>
                    <option value="pt">Português</option>
                    <option value="ko">한국어</option>
                    <option value="ja">日本語</option>
                </select>
            </div>
        </aside>

        <main class="main-content">
            
            <div id="panel-bi" class="content-panel active">
                <h2 class="section-title"></h2>
                <p class="section-intro"></p>
                <div class="projects-grid"></div>
            </div>

            <div id="panel-translation" class="content-panel">
                <h2 class="section-title"></h2>
                <p class="section-intro"></p>
                <div class="projects-grid"></div>
            </div>

            <div id="panel-about" class="content-panel">
                <h2 class="section-title"></h2>
                <p class="section-intro"></p>
                <div class="projects-grid"></div>
            </div>

        </main>
    </div>

    <!-- banner -->
    <div class="construction-overlay">Website under construction</div>

    <style>
        .construction-overlay {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            background-color: rgba(255, 0, 0, 0.15) !important;
            color: rgba(255, 0, 0, 0.35) !important;
            font-family: sans-serif !important;
            font-size: clamp(3rem, 8vw, 7rem) !important;
            font-weight: 800 !important;
            text-transform: uppercase !important;
            letter-spacing: 2px !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            text-align: center !important;
            z-index: 999999 !important;
            pointer-events: none !important;
            user-select: none !important;
        }
    </style>

    <script src="core/script.js"></script>
</body>
</html>
