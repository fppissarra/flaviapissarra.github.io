<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flávia P. Pissarra - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="profile-section">
                <div class="avatar-container">
                    <div class="avatar-placeholder"></div>
                </div>
                <h1 id="profile-name" class="profile-name">Loading...</h1>
                <p id="profile-title" class="profile-title">Loading...</p>
            </div>

            <nav class="nav-menu">
                <button id="btn-bi" class="nav-button active">Business Intelligence</button>
                <button id="btn-translation" class="nav-button">Translation</button>
                <button id="btn-academia" class="nav-button">Academia</button>
            </nav>

            <div class="social-links">
                <a href="https://github.com/fppissarra" target="_blank" class="social-link">GitHub</a>
                <a href="https://linkedin.com" target="_blank" class="social-link">LinkedIn</a>
                <a href="mailto:seuemail@provedor.com" class="social-link">Mail me</a>
                
                <select id="lang-select" class="lang-selector">
                    <option value="en" selected>English (ENG)</option>
                    <option value="pt">Português (PT)</option>
                </select>
            </div>
        </aside>

        <main class="main-content">
            <header class="section-header">
                <h2 id="section-title" class="section-title">Loading...</h2>
                <p id="section-subtitle" class="section-subtitle">Loading...</p>
            </header>

            <div id="experience-container"></div>
        </main>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
