<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flávia P. Pissarra | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pearl: #d8d4cf; 
            --text-main: #2c1e1a;
            --text-sub: #5d5752;
            /* Gradiente madrepérola iridescente */
            --mother-of-pearl: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%), 
                               linear-gradient(45deg, rgba(178, 235, 242, 0.2), rgba(248, 187, 208, 0.2), rgba(255, 245, 157, 0.2));
        }

        @keyframes pearl-shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: radial-gradient(circle at center, #ece9e4, var(--bg-pearl)) !important;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        /* Header Fino em 3 Linhas */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .user-name {
            font-size: 1.4rem; /* Linha 1: Nome */
            margin: 0;
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .user-role {
            font-size: 0.75rem; /* Linha 2: Descrição */
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-sub);
            margin: 4px 0;
        }

        .user-contact {
            font-size: 0.8rem; /* Linha 3: Links */
            margin-top: 5px;
        }

        .user-contact a {
            color: #8d807a;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s;
        }

        .user-contact a:hover { color: #f8bbd0; }

        .content-wrapper {
            margin-top: 150px;
            padding: 0 40px 60px 40px;
            display: flex;
            justify-content: center;
        }

        #experience-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .glass-box {
            background: var(--mother-of-pearl);
            background-size: 200% 200%;
            animation: pearl-shimmer 10s ease infinite;
            backdrop-filter: blur(15px);
            border-radius: 45px; /* Bordas bem arredondadas */
            padding: 35px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            transition: all 0.4s ease;
        }

        .glass-box:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.07);
        }

        .section-label {
            color: #8d807a;
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
        }

        .exp-title { 
            font-size: 1.2rem; 
            font-weight: 600; 
            margin-bottom: 5px;
            color: #1a1210;
        }

        .exp-period { 
            color: #8c857e; 
            font-size: 0.8rem; 
            margin-bottom: 15px;
            display: block;
        }

        .company-tag {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #5d5752;
            background: rgba(255, 255, 255, 0.4);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .details-text {
            line-height: 1.7;
            color: #3e2723;
            font-size: 0.95rem;
            margin-top: auto;
        }

        @media (max-width: 950px) {
            #experience-container { grid-template-columns: 1fr; }
            .content-wrapper { margin-top: 180px; }
        }
    </style>
</head>
<body>

    <header class="fixed-header">
        <h1 class="user-name">Flávia P. Pissarra</h1>
        <p class="user-role">Data Scientist | Foreign Trade & Port Logistics | Specialized in Industrial Data</p>
        <div class="user-contact">
            <a href="mailto:fppissarra@gmail.com">e-mail</a>
            <a href="https://linkedin.com/in/fppissarra" target="_blank">LinkedIn</a>
            <a href="https://github.com/fppissarra" target="_blank">GitHub</a>
        </div>
    </header>

    <div class="content-wrapper">
        <main id="experience-container"></main>
    </div>

    <script>
        const experiences = [
            {
                category: "Logistics & Data",
                title: "Data Analyst & Interpreter",
                period: "2018 — 2019",
                company: "Vale | ArcelorMittal (CPGC)",
                details: "Otimização de logística industrial via Python/SQL. Tradução técnica e protocolos de engenharia entre equipes globais."
            },
            {
                category: "NLP & Research",
                title: "Computational Linguistics Lead",
                period: "2020 — 2023",
                company: "Ifes / Lab CTecL (FAPES)",
                details: "Liderança em pesquisa de MTPE e processamento de documentos técnicos e contratuais para mercados globais."
            },
            {
                category: "Maritime Support",
                title: "Maritime Training & Mediation",
                period: "2019 — 2026",
                company: "Maritime Sector | JUCEES",
                details: "Treinamento em Business English para crews offshore e preparação para certificação JUCEES."
            }
        ];

        function render() {
            const container = document.getElementById('experience-container');
            container.innerHTML = experiences.map(exp => `
                <article class="glass-box">
                    <span class="section-label">${exp.category}</span>
                    <span class="exp-title">${exp.title}</span>
                    <span class="exp-period">${exp.period}</span>
                    <span class="company-tag">${exp.company}</span>
                    <p class="details-text">${exp.details}</p>
                </article>
            `).join('');
        }
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
