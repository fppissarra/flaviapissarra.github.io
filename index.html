<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flávia Porcu Pissarra</title>
    <link rel="stylesheet" href="./core/style.css">
    <script src="./core/script.js" defer></script>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="profile-section">
                <img id="profile-img" class="avatar" src="" alt="Profile Image" style="display:none;">
                <h1 class="profile-name">Flávia P. Pissarra</h1>
                <p id="profile-headline" class="profile-headline"></p>
            </div>

            <nav class="menu-container">
                <button id="nav-bi" class="menu-item active" data-target="panel-bi"></button>
                <button id="nav-translation" class="menu-item" data-target="panel-translation"></button>
                <button id="nav-about" class="menu-item" data-target="panel-about"></button>
            </nav>

            <div class="social-links">
                <a id="link-github" href="https://github.com/fppissarra" target="_blank" rel="noopener"></a>
                <a id="link-linkedin" href="https://linkedin.com" target="_blank" rel="noopener"></a>
                <a id="link-email" href="mailto:seu-email@provedor.com"></a>
            </div>

            <div class="lang-selector-container">
                <select id="lang-selector" class="lang-dropdown">
                    <option value="pt" selected>Português (PT)</option>
                    <option value="en">English (ENG)</option>
                    <option value="es">Español (ESP)</option>
                    <option value="it">Italiano (ITA)</option>
                    <option value="ja">日本語 (JA)</option>
                    <option value="ko">한국어 (KO)</option>
                </select>
            </div>
        </aside>

        <main class="main-content">
            <div id="construction-panel" class="viewport-panel active">
                <h2 id="construction-message" class="construction-text"></h2>
            </div>

            <div id="panel-bi" class="viewport-panel">
                <h2 id="title-bi"></h2>
                <p id="intro-bi"></p>
                <div id="container-projects-bi" class="projects-list"></div>
            </div>

            <div id="panel-translation" class="viewport-panel">
                <h2 id="title-translation"></h2>
                <p id="intro-translation"></p>
                <div id="container-projects-translation" class="projects-list"></div>
            </div>

            <div id="panel-about" class="viewport-panel">
                <h2 id="title-about"></h2>
                <p id="intro-about"></p>
                <div id="container-projects-about" class="projects-list"></div>
            </div>
        </main>
    </div>
</body>
</html>
