<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flávia P. Pissarra | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pearl: #d8d4cf; 
            --text-main: #2c1e1a;
            --text-sub: #5d5752;
            /* Gradiente madrepérola iridescente */
            --mother-of-pearl: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%), 
                               linear-gradient(45deg, rgba(178, 235, 242, 0.15), rgba(248, 187, 208, 0.15), rgba(255, 245, 157, 0.15));
        }

        @keyframes pearl-shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: radial-gradient(circle at center, #ece9e4, var(--bg-pearl)) !important;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        /* Header Fino em 3 Linhas */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            padding: 15px 0;
            text-align: center;
        }

        .user-name { font-size: 1.4rem; margin: 0; font-weight: 600; color: var(--text-main); }
        .user-role { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-sub); margin: 4px 0; }
        .user-contact { font-size: 0.75rem; margin-top: 5px; }
        .user-contact a { color: #8d807a; text-decoration: none; margin: 0 10px; }

        .content-wrapper {
            margin-top: 140px;
            padding: 0 40px 60px 40px;
            display: flex;
            justify-content: center;
        }

        #experience-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .glass-box {
            background: var(--mother-of-pearl);
            background-size: 200% 200%;
            animation: pearl-shimmer 12s ease infinite;
            backdrop-filter: blur(15px);
            border-radius: 45px; /* Bordas arredondadas */
            padding: 30px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .category-label {
            color: #8d807a;
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 5px;
        }

        .exp-item {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed rgba(0,0,0,0.05);
        }

        .exp-item:last-child { border-bottom: none; margin-bottom: 0; }

        .exp-year { font-size: 0.75rem; font-weight: 700; color: #bcaaa4; display: block; margin-bottom: 4px; }
        .exp-company { font-size: 0.85rem; font-weight: 600; color: var(--text-main); text-transform: uppercase; }
        .exp-title { font-size: 0.9rem; font-weight: 600; color: #5d4037; display: block; margin: 2px 0; }
        .exp-details { font-size: 0.85rem; line-height: 1.6; color: #5d5752; margin: 8px 0 0 0; }

        @media (max-width: 950px) {
            #experience-container { grid-template-columns: 1fr; }
            .content-wrapper { margin-top: 180px; }
        }
    </style>
</head>
<body>

    <header class="fixed-header">
        <h1 class="user-name">Flávia P. Pissarra</h1>
        <p class="user-role">Data Scientist | Foreign Trade & Port Logistics | Specialized in Industrial Data</p>
        <div class="user-contact">
            <a href="mailto:fppissarra@gmail.com">e-mail</a>
            <a href="https://linkedin.com/in/fppissarra" target="_blank">LinkedIn</a>
            <a href="https://github.com/fppissarra" target="_blank">GitHub</a>
            <a href="https://github.com/bi" target="_blank">BI Projects</a>
        </div>
    </header>

    <div class="content-wrapper">
        <main id="experience-container"></main>
    </div>

    <script>
        const categories = [
            {
                name: "Logistics & Data Intelligence",
                items: [
                    {
                        year: "2018",
                        company: "VALE",
                        role: "Data Analyst (Internship)",
                        desc: "Support for data intelligence applied to railway and port logistics, focusing on reporting automation."
                    },
                    {
                        year: "2019",
                        company: "ARCELORMITTAL (CPGC)",
                        role: "Data Analyst (Internship)",
                        desc: "Development of SQL/Python pipelines and technical translation for industrial and engineering protocols."
                    }
                ]
            },
            {
                name: "Language Technology & NLP",
                items: [
                    {
                        year: "2020 — 2023",
                        company: "FAPES/IFES (Lab CTecL)",
                        role: "Research & Outreach Fellow",
                        desc: "Led research in Computational Linguistics and Machine Translation Post-Editing (MTPE), bridging literature and technology."
                    },
                    {
                        year: "2024",
                        company: "IFES Vitória",
                        role: "Computational Linguist (Researcher)",
                        desc: "Focus on refining language models and AI-assisted technical translation for industrial documentation."
                    }
                ]
            },
            {
                name: "Maritime Sector & Mediation",
                items: [
                    {
                        year: "2026",
                        company: "IFES Cariacica",
                        role: "Port Operations Specialist (Candidate)",
                        desc: "Currently seeking specialization in Port Management and Logistics to apply data-driven insights to maritime operations."
                    },
                    {
                        year: "2019 — 2026",
                        company: "Maritime Sector",
                        role: "Specialized Training & Mediation",
                        desc: "Business English training for offshore professionals and intercultural technical mediation in industrial contexts."
                    }
                ]
            }
        ];

        function render() {
            const container = document.getElementById('experience-container');
            container.innerHTML = categories.map(cat => `
                <article class="glass-box">
                    <span class="category-label">${cat.name}</span>
                    ${cat.items.map(item => `
                        <div class="exp-item">
                            <span class="exp-year">${item.year}</span>
                            <div class="exp-company">${item.company}</div>
                            <span class="exp-title">${item.role}</span>
                            <p class="exp-details">${item.desc}</p>
                        </div>
                    `).join('')}
                </article>
            `).join('');
        }
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
