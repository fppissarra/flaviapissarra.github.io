<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flávia P. Pissarra - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="profile-section">
                <div class="avatar-container">
                    <img src="https://avatars.githubusercontent.com/u/66925367?v=4" alt="Flávia P. Pissarra" class="avatar-image">
                </div>
                <h1 id="profile-name" class="profile-name">Loading...</h1>
                <p id="profile-title" class="profile-title">Loading...</p>
            </div>

            <nav class="nav-menu">
                <button id="btn-bi" class="nav-button active">Business Intelligence</button>
                <button id="btn-translation" class="nav-button">Translation</button>
                <button id="btn-academia" class="nav-button">Academia</button>
            </nav>

            <div class="social-links">
                <a href="https://www.github.com/fppissarra" target="_blank" class="social-link">GitHub</a>
                <a href="https://www.linkedin.com/in/fppissarra" target="_blank" class="social-link">LinkedIn</a>
                <a href="mailto:fppissarra@gmail.com" class="social-link">eMail</a>
                
                <select id="lang-select" class="lang-selector">
                    <option value="en" selected>English (ENG)</option>
                    <option value="pt">Português (PTB)</option>
                    <option value="es">Español (ESP)</option>
                    <option value="it">Italiano (ITA)</option>
                    <option value="ko">한국어 (KOR)</option>
                    <option value="ja">日本語 (JAP)</option>
                </select>
            </div>
        </aside>

        <main class="main-content">
            <header class="section-header">
                <h2 id="section-title" class="section-title"></h2>
                <p id="section-subtitle" class="section-subtitle"></p>
            </header>

            <div id="experience-container"></div>
        </main>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
