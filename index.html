<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flávia P. Pissarra | CV</title>
    <!-- CSS com parâmetro de versão para evitar problemas de cache -->
    <link rel="stylesheet" href="core/style.css?v=2026">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar: Identidade e Contato (Barra Lateral) -->
        <aside class="identity-col">
            <div class="bio-section">
                <h1>Flávia P. Pissarra</h1>
                <p class="tagline">Dados | Especializando em Operação e Logística Portuária, Comércio Exterior e Relações Internacionais</p>
                
                <div class="contacts">
                    <p>📍 ES, Brasil</p>
                    <p>📧 <a href="mailto:fppissarra@gmail.com">fppissarra@gmail.com</a></p>
                    <p>🔗 <a href="https://linkedin.com/in/fppissarra" target="_blank">LinkedIn</a></p>
                    <p>💻 <a href="https://fppissarra.github.io/bi" target="_blank">Projetos de PowerBI</a></p>
                </div>
            </div>
            
            <!-- Botão de Ação para gerar o PDF via impressão do navegador -->
            <div class="sidebar-action print-hide">
                <button class="mop-btn" onclick="window.print()">Gerar PDF do Currículo</button>
            </div>
        </aside>

        <!-- Main: Bento Grid de Experiência e Formação (Conteúdo Principal) -->
        <main class="experience-col">
            <div class="bento-grid">
                <!-- As seções abaixo serão preenchidas dinamicamente pelo main.js -->
                <section class="pearl-card" id="port-content"></section>
                <section class="pearl-card" id="languages-content"></section>
                <section class="pearl-card" id="data-content"></section>
                <section class="pearl-card" id="education-content"></section>
            </div>
        </main>
    </div>

    <!-- Script principal com type module para organização do código -->
    <script src="core/main.js?v=2026" type="module"></script>
</body>
</html>
