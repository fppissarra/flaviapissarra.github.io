<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flávia P. Pissarra | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep-pearl: #d4d0c9; 
            --text-main: #2c1e1a;
            --text-sub: #5d5752;
            --iridescent: linear-gradient(45deg, #b2ebf2, #f8bbd0, #fff59d, #b3e5fc);
        }

        body {
            background: radial-gradient(circle at center, #ece9e4, var(--bg-deep-pearl)) !important;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            background: rgba(236, 233, 228, 0.92);
            backdrop-filter: blur(25px);
            border-bottom: 2px solid;
            border-image: var(--iridescent) 1;
            padding: 45px 0;
            text-align: center;
        }

        .user-name {
            font-size: 2.4rem;
            margin: 0 0 12px 0;
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        #txt-role {
            font-weight: 400;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-sub);
            margin: 0;
            max-width: 900px;
            display: inline-block;
            line-height: 1.6;
        }

        .content-wrapper {
            margin-top: 280px;
            padding: 0 50px 80px 50px;
            display: flex;
            justify-content: center;
        }

        #experience-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 35px;
            width: 100%;
            max-width: 1250px;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(15px);
            border: 2px solid; 
            border-image: var(--iridescent) 1;
            padding: 35px;
            display: flex;
            flex-direction: column;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
        }

        .glass-box:hover {
            transform: translateY(-12px);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        }

        .section-label {
            color: #8d807a;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .exp-title { 
            font-size: 1.35rem; 
            font-weight: 600; 
            margin-bottom: 8px;
            color: #1a1210;
        }

        .exp-period { 
            color: #7d756f; 
            font-size: 0.85rem; 
            margin-bottom: 20px;
            display: block;
        }

        .company-tag {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: #4a4541;
            border-left: 4px solid #f8bbd0;
            padding-left: 12px;
        }

        .details-text {
            line-height: 1.8;
            color: #2c1e1a;
            font-size: 1rem;
            margin-top: auto;
        }

        @media (max-width: 1000px) {
            #experience-container { grid-template-columns: 1fr; }
            .content-wrapper { margin-top: 350px; }
        }
    </style>
</head>
<body>

    <header class="fixed-header">
        <h1 class="user-name">Flávia Porcu Pissarra</h1>
        <p id="txt-role">
            Data Scientist | Foreign Trade & Port Logistics | Multilingual | Specialized in Industrial Data & Technical Translation
        </p>
    </header>

    <div class="content-wrapper">
        <main id="experience-container"></main>
    </div>

    <script>
        const experiences = [
            {
                category: "Logistics & Data",
                title: "Data Analyst & Technical Interpreter",
                period: "2018 — 2019",
                company: "Vale | ArcelorMittal (CPGC)",
                details: "Optimized industrial logistics at ArcelorMittal through automated SQL/Python pipelines. Ensured technical precision in engineering protocols between international teams."
            },
            {
                category: "NLP & Research",
                title: "Computational Linguistics Lead",
                period: "2020 — 2023",
                company: "Ifes / Lab CTecL (FAPES)",
                details: "Directed MTPE research for technical and contractual accuracy. Developed Python-based tools for processing large-scale maritime and industrial documentation."
            },
            {
                category: "Maritime Support",
                title: "Specialized Training & Mediation",
                period: "2019 — 2026",
                company: "Maritime Sector | JUCEES",
                details: "Specialized Business English training for offshore professionals and crew members. Managing technical translation and preparing for Sworn Translator certification."
            }
        ];

        function render() {
            const container = document.getElementById('experience-container');
            container.innerHTML = experiences.map(exp => `
                <article class="glass-box">
                    <span class="section-label">${exp.category}</span>
                    <span class="exp-title">${exp.title}</span>
                    <span class="exp-period">${exp.period}</span>
                    <span class="company-tag">${exp.company}</span>
                    <p class="details-text">${exp.details}</p>
                </article>
            `).join('');
        }
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
