<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Comércio Exterior - Flávia Pissarra</title>
    <!-- Puxando o CSS único do site -->
    <link rel="stylesheet" href="../../core/style.css">
    <style>
        /* Estilos específicos para visualização em tela cheia */
        body { 
            padding: 0; 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; /* Fundo preto para destacar o dashboard */
            display: block; /* Remove o flex centralizador do body padrão para o iframe */
        }
        
        .iframe-container {
            width: 100vw;
            height: 100vh;
            border: none;
        }

        .back-btn-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .back-btn {
            width: auto;
            padding: 10px 20px;
            background: var(--vale-teal);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: inline-block;
        }

        .back-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
            transition: 0.2s;
        }
    </style>
</head>
<body>

    <div class="back-btn-container">
        <a href="../index.html" class="back-btn">← Voltar aos Projetos</a>
    </div>

    <!-- Espaço para o seu Embed do Power BI -->
    <iframe 
        title="Dashboard Comércio Exterior"
        class="iframe-container" 
        src="COLE_AQUI_O_LINK_DO_SEU_DASHBOARD_2" 
        allowFullScreen="true">
    </iframe>

</body>
</html>
